version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "enhancement"

  - package-ecosystem: "swift"
    directory: "/MusicCountPackage"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "enhancement"
