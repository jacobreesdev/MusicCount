name: MusicCount CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  WORKSPACE: MusicLibraryVerification.xcworkspace
  SCHEME: MusicLibraryVerification
  TEST_PLAN: MusicLibraryVerification
  DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro,OS=latest
  DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
  DERIVED_DATA_PATH: .build/ci-derived-data
  PR_RESULT_BUNDLE_PATH: .build/MusicCountPRGate.xcresult
  PR_XCODEBUILD_LOG: .build/ci-pr-gate.log
  FULL_RESULT_BUNDLE_PATH: .build/MusicCountFullVerification.xcresult
  FULL_XCODEBUILD_LOG: .build/ci-full-verification.log

jobs:
  simulator-tests:
    name: MusicCount simulator tests
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select pinned Xcode
        run: |
          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "::error::Expected Xcode at $DEVELOPER_DIR"
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print
            exit 1
          fi

          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          xcodebuild -showsdks | grep iphonesimulator

      - name: Prepare simulator destination
        run: |
          device_type_id="$(
            xcrun simctl list devicetypes --json \
              | ruby -rjson -e 'types = JSON.parse(STDIN.read).fetch("devicetypes"); type = types.find { |item| item["name"] == "iPhone 17 Pro" }; abort("iPhone 17 Pro device type unavailable") unless type; puts type["identifier"]'
          )"
          runtime_id="$(
            xcrun simctl list runtimes --json \
              | ruby -rjson -e 'device_type_id = ARGV.fetch(0); runtimes = JSON.parse(STDIN.read).fetch("runtimes"); runtime = runtimes.select { |item| item["platform"] == "iOS" && item["isAvailable"] && item.fetch("supportedDeviceTypes", []).any? { |type| type["identifier"] == device_type_id } }.max_by { |item| item["version"].split(".").map(&:to_i) }; abort("No available iOS runtime supports #{device_type_id}") unless runtime; puts runtime["identifier"]' "$device_type_id"
          )"
          simulator_id="$(xcrun simctl create "MusicCount CI iPhone 17 Pro" "$device_type_id" "$runtime_id")"

          echo "DESTINATION=platform=iOS Simulator,id=$simulator_id" >> "$GITHUB_ENV"
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

      - name: Build app and tests for iOS simulator
        run: |
          set -o pipefail
          mkdir -p "$(dirname "$PR_XCODEBUILD_LOG")"

          pr_tests=(
            "-only-testing:MusicCountFeatureTests"
            "-only-testing:MusicCountUITests/MusicLibraryVerificationUITests/testMockDataLaunchShowsLibraryAndSuggestions"
          )

          xcodebuild build-for-testing \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            "${pr_tests[@]}" \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$PR_XCODEBUILD_LOG"

      - name: Test package and UI smoke on iOS simulator
        run: |
          set -o pipefail
          rm -rf "$PR_RESULT_BUNDLE_PATH"

          pr_tests=(
            "-only-testing:MusicCountFeatureTests"
            "-only-testing:MusicCountUITests/MusicLibraryVerificationUITests/testMockDataLaunchShowsLibraryAndSuggestions"
          )

          xcodebuild test-without-building \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$PR_RESULT_BUNDLE_PATH" \
            "${pr_tests[@]}" \
            CODE_SIGNING_ALLOWED=NO \
            | tee -a "$PR_XCODEBUILD_LOG"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: musiccount-ci-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/ci-pr-gate.log
            .build/MusicCountPRGate.xcresult
          if-no-files-found: ignore
          retention-days: 7

  full-verification:
    name: Full MusicCount UI verification
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select pinned Xcode
        run: |
          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "::error::Expected Xcode at $DEVELOPER_DIR"
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print
            exit 1
          fi

          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          xcodebuild -showsdks | grep iphonesimulator

      - name: Prepare simulator destination
        run: |
          device_type_id="$(
            xcrun simctl list devicetypes --json \
              | ruby -rjson -e 'types = JSON.parse(STDIN.read).fetch("devicetypes"); type = types.find { |item| item["name"] == "iPhone 17 Pro" }; abort("iPhone 17 Pro device type unavailable") unless type; puts type["identifier"]'
          )"
          runtime_id="$(
            xcrun simctl list runtimes --json \
              | ruby -rjson -e 'device_type_id = ARGV.fetch(0); runtimes = JSON.parse(STDIN.read).fetch("runtimes"); runtime = runtimes.select { |item| item["platform"] == "iOS" && item["isAvailable"] && item.fetch("supportedDeviceTypes", []).any? { |type| type["identifier"] == device_type_id } }.max_by { |item| item["version"].split(".").map(&:to_i) }; abort("No available iOS runtime supports #{device_type_id}") unless runtime; puts runtime["identifier"]' "$device_type_id"
          )"
          simulator_id="$(xcrun simctl create "MusicCount CI iPhone 17 Pro" "$device_type_id" "$runtime_id")"

          echo "DESTINATION=platform=iOS Simulator,id=$simulator_id" >> "$GITHUB_ENV"
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

      - name: Test full verification plan on iOS simulator
        run: |
          set -o pipefail
          mkdir -p "$(dirname "$FULL_XCODEBUILD_LOG")"
          rm -rf "$FULL_RESULT_BUNDLE_PATH"

          xcodebuild test \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$FULL_RESULT_BUNDLE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$FULL_XCODEBUILD_LOG"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: musiccount-full-verification-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/ci-full-verification.log
            .build/MusicCountFullVerification.xcresult
          if-no-files-found: ignore
          retention-days: 7
