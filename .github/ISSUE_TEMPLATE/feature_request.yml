name: Feature or maintenance request
description: Propose a user-facing feature, refactor, documentation change, or tooling improvement.
title: ""
labels:
  - enhancement
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem, opportunity, or maintenance need should this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should the work be checked locally and in CI?
    validations:
      required: true
  - type: textarea
    id: blockers
    attributes:
      label: Blockers or open questions
      description: List unresolved product, platform, or implementation questions.
    validations:
      required: false
